version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=cryptosharia_affiliate
      - DB_USER=root
      - DB_PASS=root
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=cryptosharia_affiliate
    volumes:
      - db_data:/var/lib/mysql
      # Auto-run schema and seed on first startup
      - ./database:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  db_data:
